<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="56" fill="#3E4A2A" stroke="#C9B97A" stroke-width="2"/>
  <!-- Inner circle border -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="#C9B97A" stroke-width="0.8"/>
  <!-- Horse silhouette (simplified) -->
  <g transform="translate(60,54)" fill="#C9B97A">
    <!-- body -->
    <ellipse cx="0" cy="4" rx="18" ry="10" />
    <!-- neck -->
    <ellipse cx="14" cy="-4" rx="7" ry="10" transform="rotate(-20,14,-4)"/>
    <!-- head -->
    <ellipse cx="20" cy="-14" rx="5" ry="7" transform="rotate(-10,20,-14)"/>
    <!-- ear -->
    <polygon points="22,-20 25,-26 28,-20" />
    <!-- legs -->
    <rect x="-12" y="12" width="4" height="12" rx="2"/>
    <rect x="-4" y="12" width="4" height="12" rx="2"/>
    <rect x="6" y="12" width="4" height="11" rx="2"/>
    <rect x="14" y="12" width="4" height="10" rx="2"/>
    <!-- tail -->
    <path d="M-17,0 Q-28,8 -24,18" stroke="#C9B97A" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Top text arc: AVALON LOVASUDVAR -->
  <path id="topArc" d="M 14,60 A 46,46 0 0,1 106,60" fill="none"/>
  <text font-family="Georgia,serif" font-size="9.5" fill="#C9B97A" letter-spacing="2.8">
    <textPath href="#topArc" startOffset="6%">AVALON LOVASUDVAR</textPath>
  </text>
  <!-- Bottom text arc: ABDA -->
  <path id="botArc" d="M 16,65 A 46,46 0 0,0 104,65" fill="none"/>
  <text font-family="Georgia,serif" font-size="9" fill="#C9B97A" letter-spacing="3">
    <textPath href="#botArc" startOffset="32%">ABDA</textPath>
  </text>
  <!-- Year -->
  <text x="60" y="98" font-family="Georgia,serif" font-size="9" fill="#C9B97A" text-anchor="middle" letter-spacing="1">2016</text>
  <!-- Decorative dots -->
  <circle cx="18" cy="60" r="1.5" fill="#C9B97A"/>
  <circle cx="102" cy="60" r="1.5" fill="#C9B97A"/>
</svg>